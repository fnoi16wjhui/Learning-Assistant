<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Assistant E Module</title>
    <style>
      :root {
        color: #172033;
        background: #f4f7fb;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      body {
        margin: 0;
      }
      .shell {
        display: flex;
        min-height: 100vh;
      }
      aside {
        width: 240px;
        padding: 28px 20px;
        color: white;
        background: #172033;
      }
      aside h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      aside p {
        color: #b8c2d6;
      }
      aside button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 12px 14px;
        border: 0;
        border-radius: 12px;
        color: #dbe5ff;
        background: transparent;
        text-align: left;
        cursor: pointer;
      }
      aside button.active,
      aside button:hover {
        background: #2f62ff;
        color: #fff;
      }
      main {
        flex: 1;
        padding: 32px;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }
      h2 {
        margin: 4px 0 0;
        font-size: 32px;
      }
      .eyebrow {
        color: #5d6c89;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }
      .badge {
        border-radius: 999px;
        padding: 6px 10px;
        background: #e8edf7;
        color: #44516a;
        font-size: 13px;
      }
      .ready {
        background: #dcfce7;
        color: #166534;
      }
      .mock,
      .missing {
        background: #fff7d6;
        color: #8a5a00;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }
      .card,
      .panel {
        background: white;
        border: 1px solid #e5eaf3;
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 12px 28px rgba(31, 44, 71, 0.06);
      }
      .panel {
        grid-column: span 2;
      }
      .card strong {
        display: block;
        margin-top: 10px;
        font-size: 36px;
      }
      .record {
        margin-top: 12px;
        padding: 14px;
        border: 1px solid #edf1f7;
        border-radius: 8px;
        background: #fbfcff;
      }
      .record.clickable {
        cursor: pointer;
      }
      .record.clickable:hover,
      .record.selected {
        border-color: #2f62ff;
        background: #f5f8ff;
        box-shadow: 0 8px 18px rgba(47, 98, 255, 0.08);
      }
      .record div {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .record-deadline {
        align-items: center;
        margin-bottom: 10px;
      }
      .record-title em {
        color: #5d6c89;
        flex-shrink: 0;
        font-size: 13px;
        font-style: normal;
      }
      .deadline-pill {
        border-radius: 999px;
        display: inline-flex;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        padding: 7px 9px;
      }
      .deadline-pill.upcoming,
      .deadline-hero.upcoming {
        background: #eaf7ef;
        color: #166534;
      }
      .deadline-pill.soon,
      .deadline-hero.soon {
        background: #fff7d6;
        color: #8a5a00;
      }
      .deadline-pill.overdue,
      .deadline-hero.overdue {
        background: #fee2e2;
        color: #991b1b;
      }
      .deadline-pill.no-deadline,
      .deadline-hero.no-deadline {
        background: #edf1f7;
        color: #5d6c89;
      }
      .task-workspace {
        background: white;
        border: 1px solid #e5eaf3;
        border-radius: 8px;
        padding: 20px;
      }
      .task-workspace-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }
      .task-workspace-header h3 {
        margin: 4px 0 0;
        font-size: 24px;
      }
      .task-count {
        border: 1px solid #d7dfed;
        border-radius: 999px;
        color: #44516a;
        font-size: 13px;
        padding: 6px 10px;
        white-space: nowrap;
      }
      .task-center-grid {
        display: grid;
        grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.1fr);
        gap: 18px;
        align-items: start;
      }
      .task-list {
        max-height: calc(100vh - 210px);
        overflow: auto;
        padding-right: 4px;
      }
      .task-detail {
        border-left: 1px solid #e5eaf3;
        min-width: 0;
        padding-left: 18px;
        position: sticky;
        top: 24px;
      }
      .deadline-hero {
        border-radius: 8px;
        margin-bottom: 16px;
        padding: 14px 16px;
      }
      .deadline-hero span {
        display: block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .deadline-hero strong {
        display: block;
        font-size: 24px;
        margin-top: 4px;
      }
      .task-detail h4 {
        font-size: 22px;
        line-height: 1.4;
        margin: 6px 0;
      }
      .task-detail-content {
        color: #44516a;
        line-height: 1.8;
        margin-top: 18px;
        white-space: pre-wrap;
      }
      .muted,
      .record p {
        color: #5d6c89;
      }
      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 110px;
        border: 1px solid #d7dfed;
        border-radius: 14px;
        padding: 12px;
        font: inherit;
      }
      .primary {
        margin-top: 12px;
        border: 0;
        border-radius: 12px;
        background: #2f62ff;
        color: #fff;
        padding: 10px 16px;
        cursor: pointer;
      }
      pre {
        overflow: auto;
        background: #101828;
        color: #dce7ff;
        border-radius: 14px;
        padding: 16px;
      }
      @media (max-width: 1000px) {
        .shell,
        header,
        .grid,
        .task-center-grid,
        .task-workspace-header {
          display: block;
        }
        aside {
          width: auto;
        }
        .card,
        .panel {
          margin-bottom: 16px;
        }
        .task-detail {
          border-left: 0;
          border-top: 1px solid #e5eaf3;
          margin-top: 18px;
          padding-left: 0;
          padding-top: 18px;
          position: static;
        }
        .task-list {
          max-height: none;
          padding-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside>
        <h1>Learning Assistant</h1>
        <p>E 模块产品平台</p>
        <nav id="nav"></nav>
      </aside>
      <main>
        <header>
          <div>
            <span class="eyebrow">A/B/C/D/E Integration</span>
            <h2 id="title">Dashboard</h2>
          </div>
          <div class="badges" id="badges"></div>
        </header>
        <section id="content"></section>
      </main>
    </div>
    <script>
      const sections = ["Dashboard", "任务中心", "资料页", "问答页", "总结页", "作业页", "设置"];
      let active = "Dashboard";
      let state = { dashboard: null, tasks: [], materials: [], health: null, qa: null, summary: null, homework: null };
      let selectedTaskId = "";

      const api = {
        get: (path) => fetch(path).then((res) => res.json()),
        post: (path, body) =>
          fetch(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }).then((res) =>
            res.json(),
          ),
      };

      function taskRecordId(record) {
        return String(
          record.raw_id ||
            record.id ||
            `${record.source || "task"}:${record.task_type || ""}:${record.course_name || ""}:${record.title || ""}`,
        );
      }

      function formatDeadline(value) {
        if (!value || typeof value !== "string") return "无 DDL";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return `DDL ${date.toLocaleString("zh-CN", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit", hour12: false })}`;
      }

      function deadlineTone(value) {
        if (!value || typeof value !== "string") return "no-deadline";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "no-deadline";
        const diff = date.getTime() - Date.now();
        if (diff < 0) return "overdue";
        if (diff <= 1000 * 60 * 60 * 24 * 3) return "soon";
        return "upcoming";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function recordList(records, empty, options = {}) {
        if (!records || records.length === 0) return `<p class="muted">${empty || "暂无数据"}</p>`;
        return records
          .slice(0, options.limit || 8)
          .map(
            (record) => {
              const showDeadline = options.selectable || options.showDeadline || record.ddl;
              return `
              <article class="record ${options.selectable ? "clickable" : ""} ${options.selectedId === taskRecordId(record) ? "selected" : ""}" data-task-id="${escapeHtml(taskRecordId(record))}">
                ${showDeadline ? `<div class="record-deadline"><span class="deadline-pill ${deadlineTone(record.ddl)}">${escapeHtml(formatDeadline(record.ddl))}</span><span>${escapeHtml(record.source_module || record.status || "E")}</span></div>` : ""}
                <div class="record-title"><strong>${escapeHtml(record.title || record.course_name || record.channel || record.source_file || "未命名记录")}</strong>${record.course_name ? `<em>${escapeHtml(record.course_name)}</em>` : ""}</div>
                <p>${escapeHtml(record.content || record.text || record.message || record.status || "已接入统一接口")}</p>
              </article>
            `;
            },
          )
          .join("");
      }

      function taskDetail(task) {
        if (!task) return "";
        return `
          <aside class="task-detail">
            <div class="deadline-hero ${deadlineTone(task.ddl)}">
              <span>DDL</span>
              <strong>${escapeHtml(formatDeadline(task.ddl))}</strong>
            </div>
            <span class="eyebrow">${escapeHtml(task.task_type || task.source_module || "task")}</span>
            <h4>${escapeHtml(task.title || task.course_name || "未命名任务")}</h4>
            <p class="muted">${escapeHtml(task.course_name || "Unknown Course")}</p>
            <div class="task-detail-content">${escapeHtml(task.content || task.message || task.text || "暂无详细内容")}</div>
          </aside>
        `;
      }

      function renderTaskCenter(content) {
        if (!state.tasks.length) {
          content.innerHTML = `<section class="task-workspace"><div class="task-workspace-header"><div><span class="eyebrow">Module A</span><h3>A 模块任务中心</h3></div><span class="task-count">0 条任务</span></div><p class="muted">等待 A 模块提供任务、公告、作业和附件数据</p></section>`;
          return;
        }
        if (!selectedTaskId || !state.tasks.some((task) => taskRecordId(task) === selectedTaskId)) {
          selectedTaskId = taskRecordId(state.tasks[0]);
        }
        const selectedTask = state.tasks.find((task) => taskRecordId(task) === selectedTaskId) || state.tasks[0];
        content.innerHTML = `
          <section class="task-workspace">
            <div class="task-workspace-header">
              <div><span class="eyebrow">Module A</span><h3>A 模块任务中心</h3></div>
              <span class="task-count">${state.tasks.length} 条任务</span>
            </div>
            <div class="task-center-grid">
              <div class="task-list">${recordList(state.tasks, "等待 A 模块提供任务、公告、作业和附件数据", { limit: state.tasks.length, selectable: true, selectedId: selectedTaskId })}</div>
              ${taskDetail(selectedTask)}
            </div>
          </section>`;
        content.querySelectorAll(".record.clickable").forEach((node) => {
          node.addEventListener("click", () => {
            selectedTaskId = node.dataset.taskId || "";
            render();
          });
        });
      }

      function renderNav() {
        document.getElementById("nav").innerHTML = sections
          .map((section) => `<button class="${active === section ? "active" : ""}" onclick="setActive('${section}')">${section}</button>`)
          .join("");
      }

      function renderBadges() {
        const modules = state.health?.modules || {};
        document.getElementById("badges").innerHTML = Object.entries(modules)
          .map(([name, status]) => `<span class="badge ${status}">${name}: ${status}</span>`)
          .join("");
      }

      function render() {
        renderNav();
        renderBadges();
        document.getElementById("title").textContent = active;
        const stats = state.dashboard?.stats || {};
        const content = document.getElementById("content");
        if (active === "Dashboard") {
          content.innerHTML = `
            <div class="grid">
              <div class="card"><span>A</span><strong>${stats.task_count || 0}</strong><p>任务数</p></div>
              <div class="card"><span>A</span><strong>${stats.schedule_count || 0}</strong><p>课表/考试</p></div>
              <div class="card"><span>B</span><strong>${stats.material_count || 0}</strong><p>资料片段</p></div>
              <div class="card"><span>A/D</span><strong>${stats.pending_homework_count || 0}</strong><p>待处理作业</p></div>
              <div class="panel"><h3>最近任务</h3>${recordList(state.dashboard?.recent_tasks, "暂无 A 模块任务数据", { showDeadline: true })}</div>
              <div class="panel"><h3>同步与知识库状态</h3>${recordList([...(state.dashboard?.sync_status || []), state.dashboard?.knowledge_status].filter(Boolean))}</div>
            </div>`;
        } else if (active === "任务中心") {
          renderTaskCenter(content);
        } else if (active === "资料页") {
          content.innerHTML = `<div class="grid"><div class="panel"><h3>B 模块解析结果</h3>${recordList(state.materials, "等待 B 模块输出资料分块")}</div><div class="panel"><h3>C 模块知识库状态</h3><pre>${JSON.stringify(state.dashboard?.knowledge_status || {}, null, 2)}</pre></div></div>`;
        } else if (active === "问答页") {
          content.innerHTML = `<div class="panel"><h3>D 模块问答接口</h3><textarea id="question">这门课最近有什么需要注意的内容？</textarea><br/><button class="primary" onclick="ask()">提问</button>${state.qa ? `<pre>${JSON.stringify(state.qa, null, 2)}</pre>` : ""}</div>`;
        } else if (active === "总结页") {
          content.innerHTML = `<div class="panel"><h3>D 模块资料总结</h3><button class="primary" onclick="summarize()">生成 Mock 总结</button>${state.summary ? `<pre>${JSON.stringify(state.summary, null, 2)}</pre>` : ""}</div>`;
        } else if (active === "作业页") {
          content.innerHTML = `<div class="panel"><h3>D 模块作业助手</h3><p>作业要求来自 A，相关知识由 C 检索，最终建议由 D 生成。</p><button class="primary" onclick="homework()">生成作业思路</button>${state.homework ? `<pre>${JSON.stringify(state.homework, null, 2)}</pre>` : ""}</div>`;
        } else {
          content.innerHTML = `<div class="panel"><h3>模块状态与接口说明</h3><p>前端只调用 E 模块统一 API。A/B 直接接入，C/D 暂以 Mock 保持演示链路。</p><pre>${JSON.stringify(state.health, null, 2)}</pre></div>`;
        }
      }

      function setActive(section) {
        active = section;
        render();
      }

      async function ask() {
        state.qa = await api.post("/api/qa", { question: document.getElementById("question").value });
        render();
      }
      async function summarize() {
        state.summary = await api.post("/api/summaries", { topic: "本周课程资料" });
        render();
      }
      async function homework() {
        state.homework = await api.post("/api/homework-assistant", { task_id: state.tasks[0]?.raw_id, question: "帮我分析这次作业的完成思路" });
        render();
      }

      async function boot() {
        const [dashboard, tasks, materials, health] = await Promise.all([
          api.get("/api/dashboard"),
          api.get("/api/tasks?limit=200"),
          api.get("/api/materials"),
          api.get("/api/health"),
        ]);
        state = { ...state, dashboard, tasks: tasks.items || [], materials: materials.items || [], health };
        render();
      }

      boot().catch((error) => {
        document.getElementById("content").innerHTML = `<div class="panel"><h3>启动失败</h3><p>${error.message}</p></div>`;
      });
    </script>
  </body>
</html>
